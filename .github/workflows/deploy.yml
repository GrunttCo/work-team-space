name: Deploy → Dokploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Notificar redeploy a Dokploy
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Dokploy
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}")
          echo "Dokploy respondió: HTTP $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "Error al llamar Dokploy (HTTP $RESPONSE)"
            exit 1
          fi
          echo "✓ Redeploy iniciado en Dokploy"
